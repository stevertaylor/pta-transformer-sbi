# v6c config – milder bottleneck + large global flow
#
# v6/v6b lesson: removing bottleneck entirely causes catastrophic overfitting
# (train-val gap 13+ nats by epoch 24). The bottleneck IS needed — v5's was
# just too aggressive (132D→48D = 64% loss). This version uses 96D (27% loss).
#
# Changes from v6b:
#   1. Add global_context_proj_dim: 96 (vs v5's 48, vs v6b's none)
#   2. Add wn_context_proj_dim: 96 (vs v5's 32, vs v6b's none)
#   Everything else unchanged from v6b.
#
# Net effect vs v5: larger global flow (10×256×3×16 vs 6×128×2×8),
# wider bottleneck (96D vs 48D/32D), wn_loss_weight 1.0 vs 0.3,
# no context dropout, no masking, Sobol on.
data:
  train_samples: 500000
  val_samples: 50000
  test_samples: 5000
  n_fourier_modes: 30
  n_toa_min: 80
  n_toa_max: 400
  tspan_min_yr: 5.0
  tspan_max_yr: 15.0
  jitter: 1.0e-20
  use_sobol: true
  reseed_per_epoch: true
  train_masking_severity: 0.0
  val_masking_severity: 0.0

prior:
  global:
    log10_A_red: [-18, -11]
    gamma_red: [1.0, 7.0]
    log10_A_dm: [-18, -11]
    gamma_dm: [1.0, 7.0]
  white_noise:
    EFAC: [0.5, 2.0]
    log10_EQUAD: [-8, -5]
    log10_ECORR: [-8, -5]

model:
  factorized: true
  n_backends_max: 4
  context_dropout: 0.0
  wn_loss_weight: 1.0
  global_context_proj_dim: 96
  wn_context_proj_dim: 96

  # Transformer encoder (same as v5)
  d_model: 256
  nhead: 8
  num_layers: 6
  dim_feedforward: 1024
  dropout: 0.1
  context_dim: 128
  use_rope: true
  use_aux_features: true

  # LSTM (shared config key, unused for transformer)
  lstm_hidden: 256
  lstm_layers: 3

  # Global flow (4D) – v4c-level capacity
  global_flow_transforms: 10
  global_flow_hidden: 256
  global_flow_layers: 3
  global_flow_bins: 16

  # WN flow (3D) – v5 size
  wn_flow_transforms: 6
  wn_flow_hidden: 128
  wn_flow_layers: 2
  wn_flow_bins: 8

training:
  epochs: 200
  batch_size: 256
  lr: 3.0e-4
  weight_decay: 5.0e-4
  flow_weight_decay: 2.0e-3
  grad_clip: 1.0
  patience: 40
  seed: 42
  warmup_fraction: 0.1
  ema_alpha: 0.15
  use_amp: true
  num_workers: 4

eval:
  n_grid: 200
  n_posterior_samples: 10000
  n_test_exact: 100
  masking_levels: [0.0, 0.15, 0.3, 0.45, 0.6]
  importance_sampling:
    enabled: true
    n_examples: 50
    n_samples: 10000

output_dir: outputs/v6c
