# v7e_cap_half — Step 3a, staged: intermediate flow capacity on v5 data regime.
#
# Why staged. v6/v7c scaled flow capacity alongside removing regularization
# (masking, wn_loss_weight, dropout) and changing the data regime. That's the
# pit. v7e_cap jumps global flow 16× (165k → 2.6M params) in one step; even
# with every v5 regularizer preserved, a single large step is still a single
# large step. v7e_cap_half splits the ladder: intermediate ~6× scaling first,
# then commit to v7e_cap only if this passes.
#
# Capacity ladder:
#   v5/v7d/v7d0_v5exact:  6 × 128 × 2 ×  8   ≈  165k  global flow params
#   v7e_cap_half:         8 × 256 × 2 × 12   ≈ ~1.0M  (this file)
#   v7e_cap:             10 × 256 × 3 × 16   ≈  2.6M
#
# Data regime: inherits v7d / v7d0_v5exact (the validated v5-equivalent
# anchor — NOT v7d0's broken Sobol+reseed+n_fixed regime).
#
# Chain-rule setting. If v7d (Step 2) WINS (ESS > 142 + 2pp), before launch:
#   model.chain_rule: false → true
#   model.theta_g_noise:  0   → 0.05
# and update output_dir accordingly. Current file assumes the conservative
# starting point (v7d0_v5exact anchor, chain_rule off).
#
# Single knob changed from baseline: global flow capacity only. WN flow,
# bottleneck dims, dropout, masking, wn_loss_weight all stay at v5 values.
#
# Success: ESS ≥ 142 (baseline anchor); no train/val divergence at ep10.
# Kill:    train/val gap > 3 nats by ep10 → capacity is the amplifier; stop
#          this branch, don't escalate to v7e_cap.
# Advance: ESS ≥ 142 AND gap < 1 nat at ep10 → run v7e_cap as the full step.

data:
  train_samples: 500000
  val_samples: 50000
  test_samples: 5000
  n_fourier_modes: 30
  n_toa_min: 80
  n_toa_max: 400
  tspan_min_yr: 5.0
  tspan_max_yr: 15.0
  jitter: 1.0e-20
  use_sobol: false
  reseed_per_epoch: true
  train_masking_severity: 0.5
  val_masking_severity: 0.15

prior:
  global:
    log10_A_red: [-18, -11]
    gamma_red: [1.0, 7.0]
    log10_A_dm: [-18, -11]
    gamma_dm: [1.0, 7.0]
  white_noise:
    EFAC: [0.5, 2.0]
    log10_EQUAD: [-8, -5]
    log10_ECORR: [-8, -5]

model:
  factorized: true
  chain_rule: false
  n_backends_max: 4
  context_dropout: 0.2
  wn_loss_weight: 0.3
  global_context_proj_dim: 48
  wn_context_proj_dim: 32

  d_model: 256
  nhead: 8
  num_layers: 6
  dim_feedforward: 1024
  dropout: 0.1
  context_dim: 128
  use_rope: true
  use_aux_features: true

  lstm_hidden: 256
  lstm_layers: 3

  # Step 3a knob (staged): intermediate global flow capacity (~6× params).
  global_flow_transforms: 8
  global_flow_hidden: 256
  global_flow_layers: 2
  global_flow_bins: 12

  wn_flow_transforms: 6
  wn_flow_hidden: 128
  wn_flow_layers: 2
  wn_flow_bins: 8

training:
  epochs: 200
  batch_size: 256
  lr: 3.0e-4
  weight_decay: 5.0e-4
  flow_weight_decay: 2.0e-3
  grad_clip: 1.0
  patience: 40
  seed: 42
  warmup_fraction: 0.1
  ema_alpha: 0.15
  use_amp: true
  num_workers: 4

eval:
  n_grid: 200
  n_posterior_samples: 10000
  n_test_exact: 100
  masking_levels: [0.0, 0.15, 0.3, 0.45, 0.6]
  importance_sampling:
    enabled: true
    n_examples: 50
    n_samples: 10000

output_dir: outputs/v7e_cap_half
