# v7d0_v5exact — v5's EXACT data regime on current HEAD.
#
# Diagnostic run after v7d0 tripped the 3-nat kill criterion at ep10
# (gap 5.84 nats vs v5's ~0.56). Tests whether the drift is data-regime
# or code.
#
# Deltas from v7d0 (four knobs, all reverted to v5 values):
#   data.train_samples:    1_000_000 → 500_000
#   data.val_samples:         10_000 →  50_000
#   data.use_sobol:             true → false     (v5 used iid sampling)
#   data.n_backends_fixed:         2 → removed   (variable 1–3 per v5)
#   prior.*.log10_A_*:   [-17,-11] → [-18,-11]
#   model.n_backends_max:          2 → 4         (match n_backends variable)
#
# Everything else (model architecture, regularization, chain_rule=false,
# training hyperparams) matches v7d0 exactly.
#
# If this run reproduces v5's tight gap (<1 nat by ep10) → drift is data
# regime, and we need to decide how to handle the current regime.
# If this run still has a large gap (>3 nats by ep10) → drift is in code
# (schedule generator / new log_f feature / deterministic val masking).
#
# Success: gap < 1 nat at ep10 (matches v5 empirically).
# Kill:    gap > 3 nats by ep10 → code drift; escalate to single-knob.

data:
  train_samples: 500000
  val_samples: 50000
  test_samples: 5000
  n_fourier_modes: 30
  n_toa_min: 80
  n_toa_max: 400
  tspan_min_yr: 5.0
  tspan_max_yr: 15.0
  jitter: 1.0e-20
  use_sobol: false
  reseed_per_epoch: true
  train_masking_severity: 0.5
  val_masking_severity: 0.15

prior:
  global:
    log10_A_red: [-18, -11]
    gamma_red: [1.0, 7.0]
    log10_A_dm: [-18, -11]
    gamma_dm: [1.0, 7.0]
  white_noise:
    EFAC: [0.5, 2.0]
    log10_EQUAD: [-8, -5]
    log10_ECORR: [-8, -5]

model:
  factorized: true
  chain_rule: false
  n_backends_max: 4
  context_dropout: 0.2
  wn_loss_weight: 0.3
  global_context_proj_dim: 48
  wn_context_proj_dim: 32

  d_model: 256
  nhead: 8
  num_layers: 6
  dim_feedforward: 1024
  dropout: 0.1
  context_dim: 128
  use_rope: true
  use_aux_features: true

  lstm_hidden: 256
  lstm_layers: 3

  global_flow_transforms: 6
  global_flow_hidden: 128
  global_flow_layers: 2
  global_flow_bins: 8

  wn_flow_transforms: 6
  wn_flow_hidden: 128
  wn_flow_layers: 2
  wn_flow_bins: 8

training:
  epochs: 200
  batch_size: 256
  lr: 3.0e-4
  weight_decay: 5.0e-4
  flow_weight_decay: 2.0e-3
  grad_clip: 1.0
  patience: 40
  seed: 42
  warmup_fraction: 0.1
  ema_alpha: 0.15
  use_amp: true
  num_workers: 4

eval:
  n_grid: 200
  n_posterior_samples: 10000
  n_test_exact: 100
  masking_levels: [0.0, 0.15, 0.3, 0.45, 0.6]
  importance_sampling:
    enabled: true
    n_examples: 50
    n_samples: 10000

output_dir: outputs/v7d0_v5exact
