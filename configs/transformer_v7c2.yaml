# v7c2 — autoregressive factorized NPE, v7c with regularization fixes
#
# v7c diagnosis (ep30, val_w=+22.93 vs train_w=-6.67 → 29.6-nat WN gap):
#   1. Inherited v6c's 96D bottlenecks. v6c itself overfit catastrophically
#      (log shows ep30 val_w=+5.67 vs train_w=-2.62 → ~8-nat gap). The plan's
#      "v6c 96D stabilized" was wrong — v5's 48/32D are the only proven values.
#   2. The θ_g pass-through opened a new memorization pathway: the WN flow
#      locked onto exact teacher-forced θ_g coordinates, adding ~15 more nats
#      of WN overfitting on top of the bottleneck problem.
#
# v7c2 changes from v7c (two surgical fixes, no other deviations):
#   - global_context_proj_dim: 96 → 48      (v5's proven value)
#   - wn_context_proj_dim:     96 → 32      (v5's proven value)
#   - theta_g_noise:           0 → 0.05     (new — σ in normalized θ_g space;
#                                            training-only perturbation on the
#                                            teacher signal, bridges train/
#                                            inference distribution)
#
# The chain-rule factorization q(θ|x) = q_g(θ_g|x) · Π_b q_wn(wn_b|x, θ_g)
# is unchanged. σ=0.05 on a normalized [-1,1] coordinate corresponds to
# a ~5% smear — well below the typical q_g posterior width but enough to
# stop the WN flow from treating θ_g_true as a delta label.

data:
  train_samples: 1000000
  val_samples: 10000
  test_samples: 5000
  n_fourier_modes: 30
  n_toa_min: 80
  n_toa_max: 400
  tspan_min_yr: 5.0
  tspan_max_yr: 15.0
  jitter: 1.0e-20
  use_sobol: true
  reseed_per_epoch: true
  n_backends_fixed: 2

prior:
  global:
    log10_A_red: [-17, -11]
    gamma_red: [1.0, 7.0]
    log10_A_dm: [-17, -11]
    gamma_dm: [1.0, 7.0]
  white_noise:
    EFAC: [0.5, 2.0]
    log10_EQUAD: [-8, -5]
    log10_ECORR: [-8, -5]

model:
  factorized: true
  n_backends_max: 2
  context_dropout: 0.0
  wn_loss_weight: 1.0
  global_context_proj_dim: 48
  wn_context_proj_dim: 32
  theta_g_noise: 0.05

  d_model: 256
  nhead: 8
  num_layers: 6
  dim_feedforward: 1024
  dropout: 0.1
  context_dim: 128
  use_rope: true
  use_aux_features: true

  lstm_hidden: 256
  lstm_layers: 3

  global_flow_transforms: 10
  global_flow_hidden: 256
  global_flow_layers: 3
  global_flow_bins: 16

  wn_flow_transforms: 6
  wn_flow_hidden: 128
  wn_flow_layers: 2
  wn_flow_bins: 8

training:
  epochs: 300
  batch_size: 256
  lr: 3.0e-4
  weight_decay: 5.0e-4
  flow_weight_decay: 2.0e-3
  grad_clip: 5.0
  patience: 60
  seed: 42
  warmup_fraction: 0.05
  use_amp: true
  num_workers: 4
  ema_alpha: 0.15

eval:
  n_grid: 200
  n_posterior_samples: 10000
  n_test_exact: 100
  masking_levels: [0.0, 0.15, 0.3, 0.45, 0.6]
  importance_sampling:
    enabled: true
    n_samples: 10000
    n_examples: 50

output_dir: outputs/v7c2
