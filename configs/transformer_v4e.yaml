# v4e config – v4d + tighter EFAC prior, epoch reseeding, per-group WD, EMA
# Changes from v4d:
#   1. EFAC prior [0.5, 2.0] (was [0.1, 10.0]) — astrophysically realistic
#   2. reseed_per_epoch: true — fresh (schedule, noise) each epoch
#   3. flow_weight_decay: 2e-3 (encoder stays at 5e-4) — stronger flow regularization
#   4. ema_alpha: 0.15 (~7-epoch window) — smoother checkpoint selection
data:
  train_samples: 500000
  val_samples: 10000
  test_samples: 5000
  n_fourier_modes: 30
  n_toa_min: 80
  n_toa_max: 400
  tspan_min_yr: 5.0
  tspan_max_yr: 15.0
  jitter: 1.0e-20
  use_sobol: true
  reseed_per_epoch: true

prior:
  log10_A_red: [-17, -11]
  gamma_red: [0.5, 6.5]
  log10_A_dm: [-17, -11]
  gamma_dm: [0.5, 6.5]
  EFAC: [0.5, 2.0]
  log10_EQUAD: [-8, -5]
  log10_ECORR: [-8, -5]

model:
  # Transformer encoder
  d_model: 256
  nhead: 8
  num_layers: 6
  dim_feedforward: 1024
  dropout: 0.05
  context_dim: 128
  use_rope: true
  use_aux_features: true

  # LSTM (shared config key, unused for transformer)
  lstm_hidden: 256
  lstm_layers: 3

  # Normalizing flow (theta_dim=7 determined from prior)
  flow_transforms: 10
  flow_hidden: 256
  flow_layers: 3
  flow_bins: 16

training:
  epochs: 200
  batch_size: 256
  lr: 5.0e-4
  weight_decay: 5.0e-4
  flow_weight_decay: 2.0e-3
  grad_clip: 5.0
  patience: 40
  seed: 42
  warmup_fraction: 0.05
  use_amp: true
  num_workers: 4
  ema_alpha: 0.15

eval:
  n_grid: 200
  n_posterior_samples: 10000
  n_test_exact: 100
  masking_levels: [0.0, 0.15, 0.3, 0.45, 0.6]
  importance_sampling:
    enabled: true
    n_samples: 10000
    n_examples: 50

output_dir: outputs/v4e
