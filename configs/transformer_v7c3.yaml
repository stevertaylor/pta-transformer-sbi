# v7c3 — autoregressive factorized NPE, aggressive θ_g regularization
#
# v7c2 diagnosis (early-stopped ep63, best val=5.55, 32-nat train/val gap):
#   - σ=0.05 teacher noise was far too small to disrupt the θ_g oracle-label
#     overfitting. WN val climbed monotonically from ep1 (w=9.5 → 17.4).
#   - v5's 48/32D bottlenecks reappearing in v7c2 did not help: the failure
#     is not a bottleneck-size issue, it is the θ_g pass-through itself.
#   - Mechanism: teacher-forced θ_g hands the WN flow an exact label for the
#     red/DM injection. The flow learns to cross-reference x against θ_g and
#     emits overconfident densities that don't generalize to val's distinct
#     (x, θ_g) pairs.
#
# v7c3: single surgical change from v7c2 — raise σ from 0.05 to 0.20.
# Normalized θ_g lives in [-1,1], so σ=0.2 is ~10% of the full prior range,
# comparable to a typical q_g posterior width. This is the cleanest test
# of the "noise too small" hypothesis. If overfitting still explodes, the
# chain-rule conditioning itself is the wrong direction and we fall back
# to v5's independence assumption (planned v7d).
#
# No cosine schedule yet — keep σ fixed so the diagnostic is unambiguous.
# If val stabilizes at a worse-than-train level (expected — σ biases q_wn
# toward the marginal), a followup with large-σ warmup → small-σ anneal
# will recover the sharp conditional at inference.

data:
  train_samples: 1000000
  val_samples: 10000
  test_samples: 5000
  n_fourier_modes: 30
  n_toa_min: 80
  n_toa_max: 400
  tspan_min_yr: 5.0
  tspan_max_yr: 15.0
  jitter: 1.0e-20
  use_sobol: true
  reseed_per_epoch: true
  n_backends_fixed: 2

prior:
  global:
    log10_A_red: [-17, -11]
    gamma_red: [1.0, 7.0]
    log10_A_dm: [-17, -11]
    gamma_dm: [1.0, 7.0]
  white_noise:
    EFAC: [0.5, 2.0]
    log10_EQUAD: [-8, -5]
    log10_ECORR: [-8, -5]

model:
  factorized: true
  n_backends_max: 2
  context_dropout: 0.0
  wn_loss_weight: 1.0
  global_context_proj_dim: 48
  wn_context_proj_dim: 32
  theta_g_noise: 0.20

  d_model: 256
  nhead: 8
  num_layers: 6
  dim_feedforward: 1024
  dropout: 0.1
  context_dim: 128
  use_rope: true
  use_aux_features: true

  lstm_hidden: 256
  lstm_layers: 3

  global_flow_transforms: 10
  global_flow_hidden: 256
  global_flow_layers: 3
  global_flow_bins: 16

  wn_flow_transforms: 6
  wn_flow_hidden: 128
  wn_flow_layers: 2
  wn_flow_bins: 8

training:
  epochs: 300
  batch_size: 256
  lr: 3.0e-4
  weight_decay: 5.0e-4
  flow_weight_decay: 2.0e-3
  grad_clip: 5.0
  patience: 60
  seed: 42
  warmup_fraction: 0.05
  use_amp: true
  num_workers: 4
  ema_alpha: 0.15

eval:
  n_grid: 200
  n_posterior_samples: 10000
  n_test_exact: 100
  masking_levels: [0.0, 0.15, 0.3, 0.45, 0.6]
  importance_sampling:
    enabled: true
    n_samples: 10000
    n_examples: 50

output_dir: outputs/v7c3
