# v5 LSTM config – factorized amortization
# Same prior / data as transformer_v5, different encoder
data:
  train_samples: 500000
  val_samples: 10000
  test_samples: 5000
  n_fourier_modes: 30
  n_toa_min: 80
  n_toa_max: 400
  tspan_min_yr: 5.0
  tspan_max_yr: 15.0
  jitter: 1.0e-20
  use_sobol: true

prior:
  global:
    log10_A_red: [-17, -11]
    gamma_red: [0.5, 6.5]
    log10_A_dm: [-17, -11]
    gamma_dm: [0.5, 6.5]
  white_noise:
    EFAC: [0.1, 10.0]
    log10_EQUAD: [-8, -5]
    log10_ECORR: [-8, -5]

model:
  factorized: true
  n_backends_max: 4
  context_dropout: 0.2
  wn_loss_weight: 1.0
  wn_context_proj_dim: 64

  # Encoder
  d_model: 256
  lstm_hidden: 256
  lstm_layers: 3
  dropout: 0.05
  context_dim: 128
  use_aux_features: true

  # Global flow (4D)
  global_flow_transforms: 8
  global_flow_hidden: 192
  global_flow_layers: 3
  global_flow_bins: 16

  # WN flow (3D, shared across backends)
  wn_flow_transforms: 6
  wn_flow_hidden: 128
  wn_flow_layers: 2
  wn_flow_bins: 8

training:
  epochs: 200
  batch_size: 256
  lr: 5.0e-4
  weight_decay: 5.0e-4
  grad_clip: 5.0
  patience: 40
  seed: 42
  warmup_fraction: 0.05
  use_amp: true
  num_workers: 4

eval:
  n_grid: 200
  n_posterior_samples: 10000
  n_test_exact: 100
  masking_levels: [0.0, 0.15, 0.3, 0.45, 0.6]

output_dir: outputs/v5
