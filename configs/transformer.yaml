# Transformer default config
data:
  train_samples: 50000
  val_samples: 2000
  test_samples: 2000
  n_fourier_modes: 30
  n_toa_min: 80
  n_toa_max: 400
  tspan_min_yr: 5.0
  tspan_max_yr: 15.0
  jitter: 1.0e-6

prior:
  log10_A_red: [-2.5, -0.5]
  gamma_red: [0.5, 6.5]

model:
  d_model: 128
  nhead: 4
  num_layers: 4
  dim_feedforward: 512
  dropout: 0.1
  context_dim: 128
  lstm_hidden: 128
  lstm_layers: 2
  flow_transforms: 6
  flow_hidden: 128

training:
  epochs: 100
  batch_size: 64
  lr: 3.0e-4
  weight_decay: 1.0e-4
  grad_clip: 5.0
  patience: 8
  seed: 42

eval:
  n_grid: 100
  n_posterior_samples: 2000
  n_test_exact: 30
  masking_levels: [0.0, 0.3, 0.6]

output_dir: outputs/transformer_v2
