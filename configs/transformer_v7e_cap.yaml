# v7e_cap — Step 3a: single-knob relaxation of v5 flow capacity.
#
# Step 2 verdict (2026-04-20): v7d (chain_rule=true, theta_g_noise=0.05)
# LOST to v7d0_v5exact (independence factorization). ESS 96 vs 142. Baseline
# for Step 3 stays v7d0_v5exact. chain_rule stays OFF.
#
# Single knob changed from baseline: global flow 6×128×2×8 → 10×256×3×16
# (~165k → ~2.6M params). Everything else (WN flow, proj dims, dropout,
# masking, wn_loss_weight, data regime) stays at v5 / v7d0_v5exact values.
#
# Data regime: v5-equivalent (500k iid, no Sobol, no n_fixed, full prior).
# This is the anchor that reached ESS=142 on HEAD eval — the one that Step 2
# confirmed as the correct Step 3 baseline.
#
# Only launch after v7e_cap_half passes (ESS ≥ 142, no divergence at ep10).
# If v7e_cap_half fails, don't run this — flow capacity is not the right
# direction and escalating further would burn GPU on a dead branch.
#
# Per-variant success: ESS ≥ 142; no train/val divergence.
# Per-variant kill:    train/val gap > 3 nats by ep10 → capacity is the
#                      amplifier; document and stop this branch.

data:
  train_samples: 500000
  val_samples: 50000
  test_samples: 5000
  n_fourier_modes: 30
  n_toa_min: 80
  n_toa_max: 400
  tspan_min_yr: 5.0
  tspan_max_yr: 15.0
  jitter: 1.0e-20
  use_sobol: false
  reseed_per_epoch: true
  train_masking_severity: 0.5
  val_masking_severity: 0.15

prior:
  global:
    log10_A_red: [-18, -11]
    gamma_red: [1.0, 7.0]
    log10_A_dm: [-18, -11]
    gamma_dm: [1.0, 7.0]
  white_noise:
    EFAC: [0.5, 2.0]
    log10_EQUAD: [-8, -5]
    log10_ECORR: [-8, -5]

model:
  factorized: true
  chain_rule: false
  n_backends_max: 4
  context_dropout: 0.2
  wn_loss_weight: 0.3
  global_context_proj_dim: 48
  wn_context_proj_dim: 32

  d_model: 256
  nhead: 8
  num_layers: 6
  dim_feedforward: 1024
  dropout: 0.1
  context_dim: 128
  use_rope: true
  use_aux_features: true

  lstm_hidden: 256
  lstm_layers: 3

  # Step 3a knob: scale global flow 16×
  global_flow_transforms: 10
  global_flow_hidden: 256
  global_flow_layers: 3
  global_flow_bins: 16

  wn_flow_transforms: 6
  wn_flow_hidden: 128
  wn_flow_layers: 2
  wn_flow_bins: 8

training:
  epochs: 200
  batch_size: 256
  lr: 3.0e-4
  weight_decay: 5.0e-4
  flow_weight_decay: 2.0e-3
  grad_clip: 1.0
  patience: 40
  seed: 42
  warmup_fraction: 0.1
  ema_alpha: 0.15
  use_amp: true
  num_workers: 4

eval:
  n_grid: 200
  n_posterior_samples: 10000
  n_test_exact: 100
  masking_levels: [0.0, 0.15, 0.3, 0.45, 0.6]
  importance_sampling:
    enabled: true
    n_examples: 50
    n_samples: 10000

output_dir: outputs/v7e_cap
